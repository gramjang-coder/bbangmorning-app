<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>빵모닝 - 빵 사진 꾸미기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FDFAF4; -webkit-font-smoothing: antialiased; }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }
    input[type="range"] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #E8E0D5; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #FF4B00; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
